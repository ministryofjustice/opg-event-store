name: Test configuration

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Test
        run: docker compose up test

      - name: Check build possible
        run: docker compose run -e BASE_PATH=/opg-event-store builder
