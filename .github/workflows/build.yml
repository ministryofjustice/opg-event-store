name: Test configuration

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Test
        run: docker compose up test

      - name: Check build possible
        run: docker compose run -e BASE_PATH=/opg-event-store builder
