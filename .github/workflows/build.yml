name: Test configuration

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Test
        run: docker compose up test

      - name: Check build possible
        run: docker compose run -e BASE_PATH=/opg-event-store builder
